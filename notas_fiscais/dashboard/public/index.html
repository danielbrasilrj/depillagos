<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Depillagos — Notas Fiscais</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --muted: #9ca3af;
    --accent: #a78bfa;
    --green: #34d399;
    --blue: #60a5fa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 0.5rem; }
  .subtitle { color: var(--muted); font-size: 1rem; margin-bottom: 3rem; }
  .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; width: 100%; max-width: 700px; }
  .btn {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem 2rem;
    text-decoration: none;
    color: var(--text);
    transition: all 0.2s;
    cursor: pointer;
    text-align: center;
  }
  .btn:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(167, 139, 250, 0.15);
  }
  .btn-icon { font-size: 3rem; margin-bottom: 1rem; display: block; }
  .btn-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.5rem; }
  .btn-desc { font-size: 0.85rem; color: var(--muted); line-height: 1.4; }
  .btn-accent { border-color: rgba(167, 139, 250, 0.3); }
  .btn-accent .btn-icon { color: var(--accent); }
  .btn-green { border-color: rgba(52, 211, 153, 0.3); }
  .btn-green .btn-icon { color: var(--green); }
  .footer { color: var(--muted); font-size: 0.75rem; margin-top: 3rem; text-align: center; }

  @media (max-width: 600px) {
    .buttons { grid-template-columns: 1fr; }
    h1 { font-size: 1.6rem; }
    .btn { padding: 2rem 1.5rem; }
  }
</style>
</head>
<body>

<h1>Depillagos</h1>
<div class="subtitle">Notas Fiscais de Serviço</div>

<div class="buttons">
  <a href="/emitidas.html" class="btn btn-accent">
    <span class="btn-icon">&#x1F4CA;</span>
    <div class="btn-title">NFS-e Emitidas no Mês</div>
    <div class="btn-desc">Valor total de notas fiscais emitidas pela Trinks. Atualizado em tempo real.</div>
  </a>

  <a href="/extrair.html" class="btn btn-green">
    <span class="btn-icon">&#x1F4CB;</span>
    <div class="btn-title">Planilha Cota Parte MEI</div>
    <div class="btn-desc">Extrai notas com rateio de profissionais parceiros. Gera CSV para o contador.</div>
  </a>
</div>

<div class="footer">Depillagos &middot; CNPJ 09.223.558/0001-00 &middot; Araruama/RJ</div>

</body>
</html>
